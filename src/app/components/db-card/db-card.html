<div>
  <div
    [routerLink]="['/characters', character().id]"
    class="card bg-base-100 w-96 shadow-sm grid grid-cols-2 rounded-md cursor-pointer group"
  >
    <div class="h-96 bg-orange-300 rounded-md">
      <img
        class="w-full h-full object-contain transition-transform duration-500 group-hover:scale-110 ease-in-out group-hover:z-10"
        [src]="character().image"
        [alt]="character().name"
      />
    </div>
    <div class="card-body bg-base-300 rounded-md">
      <h2 class="card-title text-accent">{{ character().name }}</h2>
      <div class="h-full flex flex-col justify-between">
        <div class="line-clamp-5">
          {{ character().description }}
        </div>
        <div>
          <p class="text-2xl font-bold text-warning">Power:</p>
          <span class="text-xl">{{ character().ki }}</span>
        </div>
        <div class="flex flex-col gap-2">
          <div class="flex gap-2 items-center">
            <div
              [class.badge-info]="character().gender === 'Male'"
              [class.bg-pink-400]="character().gender === 'Female'"
              class="badge rounded-full badge-sm font-medium"
            >
              {{ character().gender }}
            </div>
            <div class="badge rounded-full badge-sm badge-success truncate font-medium">
              {{ character().race }}
            </div>
          </div>
          <div class="badge rounded-full badge-sm badge-accent truncate font-medium w-full">
            {{ character().affiliation }}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
