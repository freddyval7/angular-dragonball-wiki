<div class="md:py-10 md:px-20 py-5 px-10 flex items-center min-h-screen">
  <div
    class="card md:card-side bg-base-100 shadow-sm grid grid-cols-1 md:grid-cols-2 rounded-md max-w-3xl md:max-w-4xl"
  >
    <div class="bg-orange-300 rounded-md">
      <app-carousel
        [images]="characterImages()"
        (slideSelected)="selectedState.set($event)"
      ></app-carousel>
      <!-- <img
        class="w-full h-full object-contain"
        [src]="character()?.image"
        [alt]="character()?.name"
      /> -->
    </div>
    <div class="card-body bg-base-300 rounded-md">
      <h2 class="card-title text-accent text-3xl font-bold my-4">{{ actualState()?.name }}</h2>
      <div class="h-full flex flex-col justify-between gap-2">
        <div>
          <div
            class="collapse collapse-arrow bg-base-100 border border-base-300"
            (click)="toggleDescription()"
          >
            <input type="radio" name="my-accordion-2" [checked]="showDescription()" />
            <div class="collapse-title font-semibold">Description</div>
            <div class="collapse-content text-sm/relaxed">
              {{ character()?.description }}
            </div>
          </div>
        </div>
        <div class="grid grid-cols-3 mt-4">
          <div>
            <p class="md:text-2xl font-bold text-warning">Race:</p>
            <span class="md:text-xl">{{ character()?.race }}</span>
          </div>
          <div>
            <p class="md:text-2xl font-bold text-warning">Gender:</p>
            <span class="md:text-xl">{{ character()?.gender }}</span>
          </div>
          <div>
            <p class="md:text-2xl font-bold text-warning">Affiliation:</p>
            <span class="md:text-xl">{{ character()?.affiliation }}</span>
          </div>
        </div>
        <div class="flex justify-between items-center">
          <div>
            <p class="md:text-2xl font-bold text-warning">Power:</p>
            <span class="md:text-xl">{{ actualState()?.ki }}</span>
          </div>
        </div>
        <div class="flex flex-col gap-2"></div>
      </div>
    </div>
  </div>
</div>
