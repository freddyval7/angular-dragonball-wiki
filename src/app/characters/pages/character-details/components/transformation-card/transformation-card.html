<div class="card md:w-48 bg-accent shadow-sm">
  <figure class="h-36 md:h-64 w-full bg-orange-200 rounded-md">
    <img
      class="w-full h-full object-contain"
      [src]="transformation().image"
      [alt]="transformation().name"
    />
  </figure>
  <div class="card-body text-center">
    <h2 class="card-title">{{ transformation().name }}</h2>
    <div class="flex flex-col">
      <p class="text-lg md:text-xl font-bold text-error">Max Power</p>
      <span class="md:text-lg">{{ transformation().ki }}</span>
    </div>
  </div>
</div>
