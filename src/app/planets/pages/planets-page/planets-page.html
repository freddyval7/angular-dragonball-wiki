<section class="flex flex-col gap-2 items-center">
  <div class="flex flex-col gap-4 justify-end my-5 md:flex-row">
    <search-input (value)="searchPlanet.set($event)" />
  </div>
  @if (planetResource.isLoading()) {
    <span class="loading loading-spinner loading-xl mt-5"></span>
  }
  <!--  -->
  @if (planetResource.hasValue()) {
    <div
      class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"
      infiniteScroll
      (scrolled)="onScroll()"
    >
      @for (planet of paginatedPlanets; track planet.id) {
        <planet-card [planet]="planet" />
      }
      <!--  -->
      @if (paginatedPlanets.length === 0 && !isLoading()) {
        <div>
          <p class="text-accent text-2xl">Not found Planets...</p>
        </div>
      }
    </div>
    @if (isLoading()) {
      <span class="loading loading-spinner loading-xl mt-5"></span>
    }
  }
</section>

@if (paginatedPlanets.length > 20) {
  <div
    class="fixed bottom-6 right-6 w-10 h-10 rounded-full bg-accent text-amber-50 flex items-center justify-center cursor-pointer hover:scale-110 transition-all duration-500"
    (click)="goTop()"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="32" viewBox="0 0 9 16">
      <path
        fill="currentColor"
        d="M4.5 14c-.28 0-.5-.22-.5-.5v-9c0-.28.22-.5.5-.5s.5.22.5.5v9c0 .28-.22.5-.5.5"
      />
      <path
        fill="currentColor"
        d="M8 7.5a.47.47 0 0 1-.35-.15L4.5 4.2L1.35 7.35c-.2.2-.51.2-.71 0s-.2-.51 0-.71l3.5-3.5c.2-.2.51-.2.71 0l3.5 3.5c.2.2.2.51 0 .71c-.1.1-.23.15-.35.15"
      />
    </svg>
  </div>
}
